# 《魔法石の採掘》 (Magical Stone Excavation)
#
# カードの発動:
# - CONDITIONS: 捨てられる手札が2枚以上、墓地に魔法カードが1枚以上
# - ACTIVATIONS: 手札を2枚捨てる
# - RESOLUTIONS: 魔法カード1枚をサルベージ

id: 98494543

data:
  jaName: "魔法石の採掘"
  type: "spell"
  frameType: "spell"
  spellType: "normal"

effect-chainable-actions:
  activations:
    conditions:
      requirements:
        - step: "HAND_COUNT_EXCLUDING_SELF"
          args: { minCount: 2 }
        - step: "GRAVEYARD_HAS_SPELL"
          args: { minCount: 1 }
    activations:
      - step: "SELECT_AND_DISCARD"
        args: { count: 2 }
    resolutions:
      - step: "SALVAGE_FROM_GRAVEYARD"
        args: { filterType: "spell", count: 1 }
