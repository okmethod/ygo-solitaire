# 《チキンレース》 (Chicken Game)
#
# 起動効果:
# - CONDITIONS: LP>1000、1ターンに1度制限
# - ACTIVATIONS: 1000LP支払い
# - RESOLUTIONS: 1枚ドロー
#
# Note: 本来は3つの選択肢から1つを選択するが、実装簡略化のためドロー効果のみ実装

id: 67616300

data:
  jaName: "チキンレース"
  type: "spell"
  frameType: "spell"
  spellType: "field"

effectChainableActions:
  ignitions:
    - conditions:
        requirements:
          - step: "ONCE_PER_TURN_EFFECT"
            args: { effectIndex: 1 }
          - step: "LP_GREATER_THAN"
            args: { amount: 1000 }
      activations:
        - step: "PAY_LP"
          args: { amount: 1000 }
      resolutions:
        - step: "DRAW"
          args: { count: 1 }
