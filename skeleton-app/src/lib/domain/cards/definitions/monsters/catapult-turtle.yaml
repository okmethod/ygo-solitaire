# Note: 自身をリリースできるため、CONDITIONSでのモンスター存在チェックは不要

id: 95727991

data:
  jaName: "カタパルト・タートル"
  type: "monster"
  frameType: "effect"
  attribute: "WATER"
  race: "Aqua"
  level: 5
  attack: 1000
  defense: 2000

effectChainableActions:
  ignitions:
    - activations:
        - step: "RELEASE_FOR_BURN"
          args: { damageMultiplier: 0.5 }
      resolutions:
        - step: "BURN_FROM_CONTEXT"
          args: { damageTarget: "opponent" }
